version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: oh_my_gtm
      POSTGRES_USER: oh_my_gtm
      POSTGRES_PASSWORD: oh_my_gtm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install -e . &&
             python -m uvicorn oh_my_gtm.api.app:app --host 0.0.0.0 --port 8000"
    environment:
      OH_MY_GTM_DATABASE_URL: postgresql+psycopg://oh_my_gtm:oh_my_gtm@db:5432/oh_my_gtm
      OH_MY_GTM_ENV: docker
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
